<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Cited</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: #fff5e7;
      background:
        radial-gradient(circle at 18% 10%, rgba(255, 214, 102, 0.18), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(255, 171, 92, 0.14), transparent 26%),
        linear-gradient(140deg, #221b17, #2e241d 45%, #1f1915);
    }
    .card {
      width: min(860px, calc(100% - 32px));
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255, 214, 102, 0.35);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 36px rgba(0, 0, 0, 0.42);
    }
    h1 { margin-top: 0; color: #ffd666; }
    ol { line-height: 1.55; }
    li {
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 214, 102, 0.16);
      border-radius: 8px;
      padding: 8px 10px;
      transition: transform 200ms ease;
    }
    li:hover { transform: translateX(4px); }
    .btn {
      text-decoration: none;
      color: #2b1d00;
      background: linear-gradient(135deg, #ffe6a0, #ffc85c);
      border: 1px solid #ffcf57;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 800;
      display: inline-block;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 id="title">Work Cited</h1>
    <ol id="list">
      <li>School image source, publication date, URL.</li>
      <li>Books, articles, or websites used for research.</li>
      <li>Any AI/tool references used in project creation.</li>
    </ol>
    <a class="btn" href="index.html">Back Home</a>
  </main>
  <script>
    const title = document.getElementById("title");
    const text = "Work Cited & Sources";
    let p = 0;
    title.textContent = "";
    (function animateTitle() {
      title.textContent = text.slice(0, p);
      p += 1;
      if (p <= text.length) setTimeout(animateTitle, 65);
    })();

    document.querySelectorAll("#list li").forEach((item, idx) => {
      item.style.opacity = "0";
      item.style.transform = "translateY(12px)";
      setTimeout(() => {
        item.style.transition = "opacity 420ms ease, transform 420ms ease";
        item.style.opacity = "1";
        item.style.transform = "translateY(0)";
      }, 130 * (idx + 1));
    });
  </script>
</body>
</html>
