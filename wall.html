<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floor Wall Page</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      color: #f5efe6;
      background-color: #5e4a3d;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.08) 0 2px, transparent 3px),
        radial-gradient(circle at 78% 34%, rgba(255, 255, 255, 0.06) 0 2px, transparent 3px),
        radial-gradient(circle at 40% 72%, rgba(0, 0, 0, 0.15) 0 3px, transparent 4px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.12) 1px, transparent 1px),
        linear-gradient(rgba(0, 0, 0, 0.1) 1px, transparent 1px),
        linear-gradient(140deg, #786253 0%, #6a5446 35%, #5e4a3d 100%);
      background-size: 180px 180px, 220px 220px, 260px 260px, 42px 42px, 42px 42px, cover;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(720px, calc(100% - 32px));
      background: rgba(20, 15, 12, 0.62);
      border: 1px solid rgba(255, 216, 153, 0.45);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(2px);
      transform-style: preserve-3d;
      transition: transform 260ms ease;
    }

    .title {
      margin: 0 0 10px;
      color: #ffd9a0;
      font-size: 30px;
      letter-spacing: 0.3px;
    }

    .subtitle {
      margin: 0 0 14px;
      color: #ffeccf;
      font-size: 16px;
    }

    .facts {
      margin: 0 0 16px;
      padding-left: 20px;
      line-height: 1.5;
    }

    .back-btn {
      display: inline-block;
      text-decoration: none;
      color: #2b1e12;
      background: linear-gradient(135deg, #ffe0ae 0%, #ffc978 100%);
      border: 1px solid rgba(255, 226, 176, 0.95);
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.35);
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="title" id="floor-title">Building Wall</h1>
    <p class="subtitle" id="floor-subtitle">You opened this from the school homepage.</p>
    <ul class="facts" id="floor-facts"></ul>
    <a class="back-btn" href="index.html">Back to Homepage</a>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const floorId = params.get("floor") || "2";
    const floorData = {
      "1": {
        name: "Low Class",
        theme: "Access and Opportunity",
        facts: [
          "In Never Let Me Go, clones born and raised outside of Hailsham symbolize the lower social class because they are denied meaningful education, identity development, and hope for an alternative future.",
          "Unlike Hailsham students who are encouraged to create art and reflect on their emotions, clones in other institutions are raised in stark environments focused only on their function as organ donors.",
          "Without opportunities for creative expression or critical thinking, they are treated as disposable and never shown to have individuality beyond a predetermined biological role.",
          "This lack of education has major consequences: they are not equipped to question the system that exploits them, so they remain compliant and passive, accepting their fate without resistance.",
          "The contrast with Hailsham shows how even limited educational access can produce very different lived experiences, and how education can function as either empowerment or control depending on who can access it.",
          "This mirrors real-world inequality, where underfunded schools often deny students access to resources for intellectual and creative growth, reinforcing barriers to upward mobility.",
          "The lower-tier clones reveal a society where withholding education preserves power and predetermines not only success, but also a person's sense of self and worth.",
          "Graph source: https://www.pewresearch.org/social-trends/2012/09/10/a-third-of-americans-now-say-they-are-in-the-lower-classes/"
        ]
      },
      "2": {
        name: "Middle Class",
        theme: "Mobility and Pressure",
        facts: [
          "In Never Let Me Go, the clones raised at Hailsham serve as a compelling metaphor for the middle class. Unlike clones in stark, utilitarian facilities who are treated purely as spare parts, Hailsham students are given a rich liberal arts education focused on art, writing, and reflection.",
          "However, this privilege is ultimately a gilded cage. Despite cultural enrichment and emotional development, Hailsham students still face the same predetermined fate as organ donors.",
          "This creates a cruel irony: they gain self-awareness and the language to understand what it means to be human, but they are never given power to challenge the system exploiting them.",
          "Their education functions less as liberation and more as pacification. It keeps them intellectually engaged while conditioning them to remain compliant and fulfill expected social roles.",
          "This dynamic parallels middle-class education in the real world, where students are often directed toward higher education with promises of mobility, yet many become constrained by student debt and rigid workforce demands.",
          "Hailsham also illustrates how a slight educational advantage can create a false sense of exceptionalism, seen in rumors like deferrals for true love, which maintain hope without changing structural reality.",
          "Ultimately, Hailsham masks dehumanization with culture and demonstrates how middle-tier positioning can produce not freedom, but painful awareness of systemic entrapment."
        ]
      },
      "3": {
        name: "Upper Class",
        theme: "Privilege and Protection",
        facts: [
          "Within the world of Never Let Me Go, the \"ordinary\" humans can be seen as a representation of the upper class in modern society. They are treated as fully autonomous people and are able to operate with a normal range of freedom.",
          "Unlike the clones, they can choose their life paths and also benefit directly from the clone system by receiving organs when necessary. This stands in direct contrast to clones whose futures are largely predetermined.",
          "Even when clones experience better conditions, such as at Hailsham, they are still confined to the same narrow social roles of caretaker or organ donor.",
          "This dynamic reflects upper-class advantage in real-world education: those from wealthier backgrounds are more likely to access stronger educational opportunities, which in turn expands life outcomes and social mobility.",
          "The general complacency of ordinary humans also parallels upper-class complacency. Although they may not understand every detail of the system, they appear aware of its overall structure and do not act to change it.",
          "They may not be overtly malicious, but they remain apathetic because they benefit from the system and have more to lose from reform.",
          "Thus, while ordinary humans play a smaller narrative role, their perspective reinforces the film's representation of rigid social mobility maintained by educational inequality."
        ]
      }
    };

    const title = document.getElementById("floor-title");
    const subtitle = document.getElementById("floor-subtitle");
    const facts = document.getElementById("floor-facts");
    const card = document.querySelector(".card");

    function loadFloor() {
      const floor = floorData[floorId];
      if (!floor) {
        title.textContent = "Floor Not Found";
        subtitle.textContent = "Choose a valid class from the homepage.";
        facts.innerHTML = "<li>No details available for this selection.</li>";
        return;
      }

      title.textContent = floor.name + " Wall";
      subtitle.textContent = floor.theme;
      facts.innerHTML = "";
      floor.facts.forEach((line) => {
        const item = document.createElement("li");
        item.textContent = line;
        facts.appendChild(item);
      });
    }

    document.addEventListener("mousemove", (event) => {
      const x = (event.clientX / window.innerWidth - 0.5) * 5;
      const y = (event.clientY / window.innerHeight - 0.5) * 5;
      card.style.transform = "rotateY(" + x + "deg) rotateX(" + (-y) + "deg)";
    });

    loadFloor();
  </script>
</body>
</html>
